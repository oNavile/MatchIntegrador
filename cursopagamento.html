
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Pagamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    /* Simulando as classes personalizadas do seu projeto */
    body {
      background-color: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .cor-main {
      background-color: #1e293b; /* Substitua pela cor exata do seu projeto */
    }
    /* Estilo para a tela de carregamento */
    #loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner-border text-success" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <main id="main-content" class="flex-grow-1 d-flex flex-column pt-5 mt-5 mt-md-4">
    <div class="container-fluid pt-3 pb-0 pe-0 ps-3 ps-md-4 d-flex flex-column flex-grow-1">
      <div class="p-4 p-md-5 shadow-lg text-white cor-main d-flex flex-column flex-grow-1"
           style="border-radius: 0; border-top-left-radius: 30px;">
        
        <h1 class="display-3 fw-bolder mb-4 lh-sm">
          Finalizar<br>
          <span class="text-success">Pagamento!</span>
        </h1>

        <div class="row g-4 justify-content-center flex-grow-1">
          
          <div class="col-12 col-lg-5">
            <div class="card h-100 shadow rounded-4" style="background-color: #9DC5BB;">
              <div class="card-body p-4 d-flex flex-column text-dark">
                <span id="curso-badge" class="badge bg-dark bg-opacity-10 text-dark align-self-start mb-3 px-3 py-2 rounded-pill fw-semibold">
                  Curso --
                </span>

                <h5 id="curso-titulo" class="card-title fw-bold mb-3">Carregando título...</h5>
                <p id="curso-descricao" class="mb-4">Carregando descrição do curso...</p>

                <div class="mt-auto pt-3 border-top border-dark border-opacity-25">
                  <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Total:</span>
                    <h3 id="curso-valor" class="fw-bold mb-0">R$ 0,00</h3>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-7">
            <div class="card h-100 shadow rounded-4 bg-white text-dark">
              <div class="card-body p-4 d-flex flex-column">
                <h5 class="fw-bold mb-4 text-uppercase tracking-wide text-secondary" style="font-size: 0.9rem;">
                  Informações do Cartão de Crédito
                </h5>

                <form id="form-pagamento" class="d-flex flex-column flex-grow-1">
                  <div class="mb-3">
                    <label class="form-label fw-semibold small">Nome Impresso no Cartão</label>
                    <input type="text" id="nomeCartao" class="form-control form-control-lg rounded-3" 
                           placeholder="Ex: JOÃO S SILVA" required style="text-transform: uppercase;">
                  </div>

                  <div class="mb-3">
                    <label class="form-label fw-semibold small">Número do Cartão</label>
                    <input type="text" id="numeroCartao" class="form-control form-control-lg rounded-3" 
                           placeholder="0000 0000 0000 0000" maxlength="16" required>
                  </div>

                  <div class="row g-3 mb-4">
                    <div class="col-6">
                      <label class="form-label fw-semibold small">Validade</label>
                      <input type="text" id="validade" class="form-control form-control-lg rounded-3" 
                             placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="col-6">
                      <label class="form-label fw-semibold small">CVV</label>
                      <input type="text" id="cvv" class="form-control form-control-lg rounded-3" 
                             placeholder="123" maxlength="3" required>
                    </div>
                  </div>

                  <div class="mt-auto d-flex gap-2">
                    <button type="button" class="btn btn-dark px-4" onclick="voltar painel()">
                      Voltar
                    </button>
                    <button type="submit" id="btn-submit" class="btn btn-success flex-fill py-2 fw-bold shadow-sm text-uppercase">
                      Confirmar Inscrição
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main
</body>
</html>
